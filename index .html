<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK IN/OUT | Minimalist Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f1f3;
            --graphite-green: #4a5d4e;
            --tea-brown: #a68b6d;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--graphite-green);
            letter-spacing: 0.05em;
            margin: 0;
            overflow-x: hidden;
        }

        /* Neumorphism 容器 */
        .neu-card {
            background: var(--bg-color);
            border-radius: 30px;
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                        -10px -10px 20px var(--shadow-light);
        }

        /* 打卡按鈕樣式 */
        .punch-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: 12px 12px 24px var(--shadow-dark), 
                        -12px -12px 24px var(--shadow-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border: none;
            outline: none;
        }

        .punch-btn:active {
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.98);
        }

        /* 呼吸裝飾環 */
        .breath-ring {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            border: 1px solid var(--tea-brown);
            opacity: 0.3;
            animation: breathe 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }

        /* 導航欄樣式 */
        .nav-link {
            position: relative;
            padding-bottom: 4px;
        }
        .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 2px;
            background: var(--tea-brown);
        }

        /* 時間軸樣式 */
        .timeline-item {
            position: relative;
            padding-left: 30px;
            border-left: 1px solid var(--tea-brown);
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -5.5px;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--tea-brown);
        }

        /* Toast 輕薄提示 */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(74, 93, 78, 0.9);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- 頂部標題 -->
    <header class="w-full max-w-md flex justify-between items-center mb-12 mt-8 px-4">
        <h1 class="text-2xl font-light text-graphite-green">CLOCK IN/OUT</h1>
        <div class="flex space-x-6 text-sm">
            <button onclick="showPage('main')" id="nav-main" class="nav-link active">首頁</button>
            <button onclick="showPage('list')" id="nav-list" class="nav-link">日記</button>
        </div>
    </header>

    <!-- 主頁面：打卡 -->
    <main id="page-main" class="w-full max-w-md flex flex-col items-center">
        <div class="mb-16 text-center">
            <div id="current-time" class="text-4xl font-light mb-2">00:00:00</div>
            <div id="current-date" class="text-xs tracking-widest uppercase opacity-60">2026年02月26日 星期四</div>
        </div>

        <div class="relative flex items-center justify-center mb-20">
            <div class="breath-ring"></div>
            <button onclick="handlePunch()" class="punch-btn">
                <span id="btn-text" class="text-xl font-medium tracking-[0.2em] text-graphite-green">上班</span>
                <span id="btn-subtext" class="text-[10px] mt-2 opacity-40">TAP TO LOG TIME</span>
            </button>
        </div>

        <div class="w-full grid grid-cols-2 gap-6">
            <div class="neu-card p-6 text-center">
                <div class="text-[10px] opacity-50 mb-1">今日上班</div>
                <div id="today-start" class="text-lg font-light">-- : --</div>
            </div>
            <div class="neu-card p-6 text-center">
                <div class="text-[10px] opacity-50 mb-1">今日下班</div>
                <div id="today-end" class="text-lg font-light">-- : --</div>
            </div>
        </div>
    </main>

    <!-- 列表頁面：出勤狀況 -->
    <main id="page-list" class="w-full max-w-md hidden">
        <div class="mb-8 flex justify-between items-end px-2">
            <div>
                <h2 class="text-xl font-light">本月紀錄</h2>
                <p id="month-subtext" class="text-[10px] opacity-50">Monthly Time Journal</p>
            </div>
            <div id="month-display" class="text-sm font-medium">----.--</div>
        </div>
        
        <div class="neu-card p-8 min-h-[400px]">
            <div id="record-container" class="space-y-8">
                <!-- 紀錄將由此生成 -->
                <div class="text-center py-20 opacity-30 text-sm">尚無時光遺落</div>
            </div>
        </div>
    </main>

    <!-- 提示框 -->
    <div id="toast">已為您記錄此刻</div>

    <script>
        // 狀態管理
        let attendanceData = JSON.parse(localStorage.getItem('timeJournal')) || {};
        
        function getTodayKey() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 更新時鐘
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            
            const timeEl = document.getElementById('current-time');
            const dateEl = document.getElementById('current-date');
            if(timeEl) timeEl.textContent = timeStr;
            if(dateEl) dateEl.textContent = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 頁面切換
        function showPage(page) {
            document.getElementById('page-main').classList.toggle('hidden', page !== 'main');
            document.getElementById('page-list').classList.toggle('hidden', page !== 'list');
            document.getElementById('nav-main').classList.toggle('active', page === 'main');
            document.getElementById('nav-list').classList.toggle('active', page === 'list');
            
            if (page === 'list') renderRecords();
            if (page === 'main') updateTodayDisplay();
        }

        // 打卡邏輯
        function handlePunch() {
            const now = new Date();
            const todayKey = getTodayKey();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            if (!attendanceData[todayKey]) {
                // 第一次打卡：上班
                attendanceData[todayKey] = {
                    date: todayKey,
                    displayDate: `${now.getMonth()+1}/${now.getDate()}`,
                    start: timeStr,
                    end: null
                };
                showToast("上班時間已記錄");
            } else {
                // 第二次以上：更新下班
                attendanceData[todayKey].end = timeStr;
                showToast("下班時間已記錄");
            }

            localStorage.setItem('timeJournal', JSON.stringify(attendanceData));
            updateTodayDisplay();
            
            // 按鈕視覺反饋
            const btn = document.querySelector('.punch-btn');
            btn.style.boxShadow = "inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light)";
            setTimeout(() => {
                btn.style.boxShadow = "";
            }, 200);
        }

        // 更新今日數值
        function updateTodayDisplay() {
            const todayKey = getTodayKey();
            const data = attendanceData[todayKey];
            const btnText = document.getElementById('btn-text');
            
            if (data) {
                document.getElementById('today-start').textContent = data.start;
                document.getElementById('today-end').textContent = data.end || "-- : --";
                btnText.textContent = "下班";
            } else {
                document.getElementById('today-start').textContent = "-- : --";
                document.getElementById('today-end').textContent = "-- : --";
                btnText.textContent = "上班";
            }
        }

        // 渲染紀錄列表
        function renderRecords() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
            
            document.getElementById('month-display').textContent = `${currentYear}.${currentMonth}`;
            
            const container = document.getElementById('record-container');
            const sortedKeys = Object.keys(attendanceData).sort((a, b) => new Date(b) - new Date(a));
            
            if (sortedKeys.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 text-sm">尚無時光遺落</div>`;
                return;
            }

            container.innerHTML = sortedKeys.map(key => {
                const item = attendanceData[key];
                return `
                    <div class="timeline-item">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-sm font-medium text-tea-brown mb-1">${item.displayDate}</div>
                                <div class="text-[10px] opacity-40 uppercase">Time Record</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs font-light">
                                    <span class="opacity-50">上</span> ${item.start}
                                </div>
                                <div class="text-xs font-light mt-1">
                                    <span class="opacity-50">下</span> ${item.end || '尚未記錄'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Toast 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 初始化
        updateTodayDisplay();
    </script>
</body>
</html>
