<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK IN/OUT | Minimalist Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f1f3;
            --graphite-green: #4a5d4e;
            --tea-brown: #a68b6d;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --holiday-color: #d4a373;
            --leave-color: #9ca3af;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--graphite-green);
            letter-spacing: 0.05em;
            margin: 0;
            overflow-x: hidden;
        }

        .neu-card {
            background: var(--bg-color);
            border-radius: 30px;
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                        -10px -10px 20px var(--shadow-light);
        }

        .neu-inset {
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
        }

        .punch-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: 12px 12px 24px var(--shadow-dark), 
                        -12px -12px 24px var(--shadow-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border: none;
            outline: none;
        }

        .punch-btn:active {
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.98);
        }

        .breath-ring {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            border: 1px solid var(--tea-brown);
            opacity: 0.3;
            animation: breathe 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }

        .nav-link {
            position: relative;
            padding-bottom: 4px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .nav-link.active {
            opacity: 1;
        }
        .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 2px;
            background: var(--tea-brown);
        }

        .timeline-item {
            position: relative;
            padding-left: 30px;
            border-left: 1px solid var(--tea-brown);
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 0 10px 10px 0;
        }
        .timeline-item:hover {
            background: rgba(166, 139, 109, 0.05);
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -5.5px;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--tea-brown);
        }

        .is-holiday::before { background: var(--holiday-color); }
        .is-leave::before { background: var(--leave-color); }
        .is-leave { opacity: 0.6; }

        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(74, 93, 78, 0.9);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 彈窗樣式 */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            width: 90%;
            max-width: 320px;
            padding: 2rem;
        }
        input[type="time"], select {
            background: var(--bg-color);
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: var(--graphite-green);
            outline: none;
            width: 100%;
            text-align: center;
            appearance: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- 頂部標題 -->
    <header class="w-full max-w-md flex justify-between items-center mb-12 mt-8 px-4">
        <h1 class="text-2xl font-light text-graphite-green">CLOCK IN/OUT</h1>
        <div class="flex space-x-6 text-sm">
            <button onclick="showPage('main')" id="nav-main" class="nav-link active">首頁</button>
            <button onclick="showPage('list')" id="nav-list" class="nav-link">日記</button>
        </div>
    </header>

    <!-- 主頁面：打卡 -->
    <main id="page-main" class="w-full max-w-md flex flex-col items-center">
        <div class="mb-12 text-center">
            <div id="current-time" class="text-4xl font-light mb-2">00:00:00</div>
            <div id="current-date" class="text-xs tracking-widest uppercase opacity-60">----年--月--日 ---</div>
            <div id="holiday-tag" class="text-[10px] mt-2 text-tea-brown font-medium hidden">休息時間</div>
        </div>

        <div class="relative flex items-center justify-center mb-16">
            <div class="breath-ring"></div>
            <button onclick="handlePunch()" class="punch-btn">
                <span id="btn-text" class="text-xl font-medium tracking-[0.2em] text-graphite-green">上班</span>
                <span id="btn-subtext" class="text-[10px] mt-2 opacity-40">TAP TO LOG TIME</span>
            </button>
        </div>

        <div class="w-full grid grid-cols-2 gap-6">
            <div class="neu-card p-6 text-center cursor-pointer" onclick="openEditModal('start')">
                <div class="text-[10px] opacity-50 mb-1">今日上班</div>
                <div id="today-start" class="text-lg font-light">-- : --</div>
                <div class="text-[8px] opacity-30 mt-1">點擊修改</div>
            </div>
            <div class="neu-card p-6 text-center cursor-pointer" onclick="openEditModal('end')">
                <div class="text-[10px] opacity-50 mb-1">今日下班</div>
                <div id="today-end" class="text-lg font-light">-- : --</div>
                <div class="text-[8px] opacity-30 mt-1">點擊修改</div>
            </div>
        </div>
    </main>

    <!-- 列表頁面：日記 -->
    <main id="page-list" class="w-full max-w-md hidden">
        <div class="mb-8 flex justify-between items-end px-2">
            <div>
                <h2 class="text-xl font-light">本月紀錄</h2>
                <p id="month-subtext" class="text-[10px] opacity-50">Monthly Time Journal</p>
            </div>
            <div id="month-display" class="text-sm font-medium">----.--</div>
        </div>
        
        <div class="neu-card p-8 min-h-[450px] mb-12">
            <div id="record-container" class="space-y-8">
                <div class="text-center py-20 opacity-30 text-sm">尚無時光遺落</div>
            </div>
        </div>
    </main>

    <!-- 編輯對話框 -->
    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content neu-card" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-center text-sm mb-6 opacity-60">調整紀錄時間</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] opacity-40 mb-1 block text-center">日期狀態</label>
                    <div class="neu-inset rounded-xl p-1">
                        <select id="edit-status">
                            <option value="work">上班 (Work Day)</option>
                            <option value="leave">請假 (On Leave)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] opacity-40 mb-1 block text-center">上班時間</label>
                    <div class="neu-inset rounded-xl p-1">
                        <input type="time" id="edit-start">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] opacity-40 mb-1 block text-center">下班時間</label>
                    <div class="neu-inset rounded-xl p-1">
                        <input type="time" id="edit-end">
                    </div>
                </div>
                <div class="pt-4 flex gap-4">
                    <button onclick="saveEdit()" class="flex-1 py-3 neu-card text-xs active:shadow-none">儲存</button>
                    <button onclick="closeModal()" class="flex-1 py-3 opacity-40 text-xs">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">已為您記錄此刻</div>

    <script>
        const holidays2026 = {
            "2026-01-01": "元旦",
            "2026-02-16": "除夕",
            "2026-02-17": "春節",
            "2026-02-18": "春節",
            "2026-02-19": "春節",
            "2026-02-20": "春節",
            "2026-02-21": "春節",
            "2026-02-28": "和平紀念日",
            "2026-04-03": "兒童節",
            "2026-04-04": "清明節",
            "2026-06-19": "端午節",
            "2026-09-25": "中秋節",
            "2026-10-10": "國慶日"
        };

        let attendanceData = JSON.parse(localStorage.getItem('timeJournal')) || {};
        let currentEditDate = null;
        
        function getTodayKey() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function isHoliday(dateKey) {
            if (holidays2026[dateKey]) return holidays2026[dateKey];
            const d = new Date(dateKey);
            const day = d.getDay();
            if (day === 0 || day === 6) return "週末休息";
            return null;
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            
            document.getElementById('current-time').textContent = timeStr;
            document.getElementById('current-date').textContent = dateStr;

            const todayKey = getTodayKey();
            const holidayName = isHoliday(todayKey);
            const tag = document.getElementById('holiday-tag');
            if (holidayName) {
                tag.textContent = holidayName;
                tag.classList.remove('hidden');
            } else {
                tag.classList.add('hidden');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(page) {
            document.getElementById('page-main').classList.toggle('hidden', page !== 'main');
            document.getElementById('page-list').classList.toggle('hidden', page !== 'list');
            document.getElementById('nav-main').classList.toggle('active', page === 'main');
            document.getElementById('nav-list').classList.toggle('active', page === 'list');
            if (page === 'list') renderRecords();
            if (page === 'main') updateTodayDisplay();
        }

        function handlePunch() {
            const now = new Date();
            const todayKey = getTodayKey();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            if (!attendanceData[todayKey]) {
                attendanceData[todayKey] = {
                    date: todayKey,
                    displayDate: `${now.getMonth()+1}/${now.getDate()}`,
                    start: timeStr,
                    end: null,
                    status: 'work'
                };
                showToast("上班紀錄成功");
            } else {
                attendanceData[todayKey].end = timeStr;
                attendanceData[todayKey].status = 'work'; // 打卡即視為上班
                showToast("下班紀錄成功");
            }

            localStorage.setItem('timeJournal', JSON.stringify(attendanceData));
            updateTodayDisplay();
        }

        function updateTodayDisplay() {
            const todayKey = getTodayKey();
            const data = attendanceData[todayKey];
            const btnText = document.getElementById('btn-text');
            
            if (data) {
                document.getElementById('today-start').textContent = data.start || "-- : --";
                document.getElementById('today-end').textContent = data.end || "-- : --";
                btnText.textContent = "下班";
            } else {
                document.getElementById('today-start').textContent = "-- : --";
                document.getElementById('today-end').textContent = "-- : --";
                btnText.textContent = "上班";
            }
        }

        function openEditModal(dateKeyOrType) {
            const modal = document.getElementById('modal-overlay');
            const todayKey = getTodayKey();
            
            if (dateKeyOrType === 'start' || dateKeyOrType === 'end') {
                currentEditDate = todayKey;
            } else {
                currentEditDate = dateKeyOrType;
            }

            const data = attendanceData[currentEditDate] || { start: "", end: "", status: "work" };
            document.getElementById('edit-start').value = data.start || "";
            document.getElementById('edit-end').value = data.end || "";
            document.getElementById('edit-status').value = data.status || "work";
            document.getElementById('modal-title').textContent = `${currentEditDate} 紀錄修正`;
            
            modal.style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function saveEdit() {
            const startVal = document.getElementById('edit-start').value;
            const endVal = document.getElementById('edit-end').value;
            const statusVal = document.getElementById('edit-status').value;

            if (!attendanceData[currentEditDate]) {
                const dateObj = new Date(currentEditDate);
                attendanceData[currentEditDate] = {
                    date: currentEditDate,
                    displayDate: `${dateObj.getMonth()+1}/${dateObj.getDate()}`
                };
            }

            attendanceData[currentEditDate].start = startVal;
            attendanceData[currentEditDate].end = endVal;
            attendanceData[currentEditDate].status = statusVal;

            localStorage.setItem('timeJournal', JSON.stringify(attendanceData));
            showToast("紀錄已更新");
            closeModal();
            updateTodayDisplay();
            renderRecords();
        }

        function renderRecords() {
            const now = new Date();
            document.getElementById('month-display').textContent = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}`;
            
            const container = document.getElementById('record-container');
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = "";
            // 從 1 號開始遞增
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const item = attendanceData[dateKey];
                const holiday = isHoliday(dateKey);
                const isToday = dateKey === getTodayKey();
                const isLeave = item && item.status === 'leave';

                html += `
                    <div class="timeline-item ${holiday ? 'is-holiday' : ''} ${isLeave ? 'is-leave' : ''} ${isToday ? 'font-medium' : ''}" onclick="openEditModal('${dateKey}')">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="text-sm ${holiday ? 'text-tea-brown' : (isLeave ? 'text-gray-400' : 'text-graphite-green')}">${month + 1}/${d}</div>
                                <div class="text-[9px] opacity-40 uppercase">${isLeave ? 'On Leave' : (holiday || 'WORK DAY')}</div>
                            </div>
                            <div class="text-right">
                                ${item && !isLeave ? `
                                    <div class="text-xs font-light">
                                        <span class="opacity-40">上</span> ${item.start || '--:--'}
                                    </div>
                                    <div class="text-xs font-light mt-1">
                                        <span class="opacity-40">下</span> ${item.end || '--:--'}
                                    </div>
                                ` : `
                                    <div class="text-[10px] opacity-20 italic">${isLeave ? '請假' : (holiday ? '休息' : '無紀錄')}</div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        updateTodayDisplay();
    </script>
</body>
</html>
